<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <div class="clock-face">
    <div class="hand hour-hand" id="hour"></div>
    <div class="hand min-hand" id="min"></div>
    <div class="hand sec-hand" id="sec"></div>

    <!-- Numbers wrapped in spans -->
    <div class="numbers n1"><span>1</span></div>
    <div class="numbers n2"><span>2</span></div>
    <div class="numbers n3"><span>3</span></div>
    <div class="numbers n4"><span>4</span></div>
    <div class="numbers n5"><span>5</span></div>
    <div class="numbers n6"><span>6</span></div>
    <div class="numbers n7"><span>7</span></div>
    <div class="numbers n8"><span>8</span></div>
    <div class="numbers n9"><span>9</span></div>
    <div class="numbers n10"><span>10</span></div>
    <div class="numbers n11"><span>11</span></div>
    <div class="numbers n12"><span>12</span></div>
</div>








    <script src="script.js"></script>


</body>

</html>
